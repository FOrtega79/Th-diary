name: TherianDiary

# ─── Global options ────────────────────────────────────────────────────────────
options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true   # mirrors the folder hierarchy in Xcode navigator

# ─── Build settings ────────────────────────────────────────────────────────────
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: "NO"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_STRICT_CONCURRENCY: minimal

# ─── Targets ───────────────────────────────────────────────────────────────────
targets:

  # ── Main app ──────────────────────────────────────────────────────────────────
  TherianDiary:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    # Source files (entire TherianDiary/ folder)
    sources:
      - path: TherianDiary
        excludes:
          - "Info.plist"
          - "GoogleService-Info.plist"
          - "TherianDiary.entitlements"

    # Bundle resources
    resources:
      - path: TherianDiary/GoogleService-Info.plist

    # Info.plist
    info:
      path: TherianDiary/Info.plist

    # Entitlements (Apple Sign-In)
    entitlements:
      path: TherianDiary/TherianDiary.entitlements

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.theriandiary
        INFOPLIST_FILE: TherianDiary/Info.plist
        CODE_SIGN_ENTITLEMENTS: TherianDiary/TherianDiary.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-Owholemodule"
          VALIDATE_PRODUCT: "YES"

    # Required capabilities
    attributes:
      SystemCapabilities:
        com.apple.Sign_In_with_Apple:
          enabled: 1

    # Build phases
    preBuildScripts:
      # Crashlytics dSYM upload (Firebase Crashlytics)
      - name: "[Firebase] Crashlytics dSYM Upload"
        script: |
          "${PODS_ROOT}/FirebaseCrashlytics/run"
        inputFiles:
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}"
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${TARGET_NAME}"
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Info.plist"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist"
          - "$(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)"
        runOnlyWhenInstalling: false

  # ── Unit tests ────────────────────────────────────────────────────────────────
  TherianDiaryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: TherianDiaryTests

    dependencies:
      - target: TherianDiary

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.theriandiary.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TherianDiary.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TherianDiary"
