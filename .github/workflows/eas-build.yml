name: EAS Build & Preview

on:
  push:
    branches: ["claude/**", "main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "ios"
        type: choice
        options: [ios, android, all]
      profile:
        description: "Build profile"
        required: true
        default: "preview"
        type: choice
        options: [development, preview, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Type-check & lint (runs on ubuntu — no Mac needed) ──────────────────────
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

  # ── EAS Build (cloud Mac/Linux — Expo handles it) ────────────────────────────
  build:
    name: EAS Build (${{ github.event.inputs.platform || 'ios' }})
    runs-on: ubuntu-latest   # EAS Build itself runs in Expo's cloud
    needs: check
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Inject Firebase config from GitHub secret
      - name: Inject Firebase config
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          if [ -n "$FIREBASE_CONFIG" ]; then
            echo "$FIREBASE_CONFIG" > services/firebase-config.json
            echo "✅ Firebase config injected"
          else
            echo "⚠️  FIREBASE_CONFIG_JSON secret not set — using placeholder values"
          fi

      - name: EAS Build
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform || 'ios' }} \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive

  # ── Submit to App Store (manual only) ────────────────────────────────────────
  submit:
    name: Submit to App Store
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit iOS
        run: eas submit --platform ios --non-interactive --latest
