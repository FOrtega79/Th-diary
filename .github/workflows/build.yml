name: iOS Build & Test

on:
  push:
    branches: [ "claude/**", "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

# ─── Concurrency: cancel in-flight runs on the same branch ───────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Xcode 15 / iOS 17 Simulator)
    runs-on: macos-14          # Apple Silicon runner — fastest & cheapest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set Xcode version ─────────────────────────────────────────────────
      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # ── 3. Inject Firebase secrets ──────────────────────────────────────────
      # Store the full contents of your GoogleService-Info.plist as a
      # GitHub secret named GOOGLE_SERVICE_INFO_PLIST, then inject it here.
      - name: Inject GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO" ]; then
            echo "$GOOGLE_SERVICE_INFO" > TherianDiary/GoogleService-Info.plist
            echo "✅ GoogleService-Info.plist injected from secrets"
          else
            echo "⚠️  Secret GOOGLE_SERVICE_INFO_PLIST not set – using placeholder file"
          fi

      # ── 4. Install XcodeGen ──────────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── 5. Generate .xcodeproj ───────────────────────────────────────────────
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # ── 6. Cache CocoaPods ───────────────────────────────────────────────────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: pods-${{ hashFiles('Podfile.lock') }}
          restore-keys: pods-

      # ── 7. Install CocoaPods ─────────────────────────────────────────────────
      - name: Install CocoaPods
        run: pod install --repo-update

      # ── 8. Build (no code signing) ───────────────────────────────────────────
      - name: Build for simulator
        run: |
          xcodebuild build \
            -workspace TherianDiary.xcworkspace \
            -scheme TherianDiary \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      # ── 9. Run unit tests ────────────────────────────────────────────────────
      - name: Run unit tests
        run: |
          xcodebuild test \
            -workspace TherianDiary.xcworkspace \
            -scheme TherianDiaryTests \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

  # ── Optional: Archive for TestFlight (manual trigger only) ──────────────────
  archive:
    name: Archive for TestFlight
    runs-on: macos-14
    needs: build
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Inject GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICE_INFO" > TherianDiary/GoogleService-Info.plist

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import "$RUNNER_TEMP/cert.p12" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Install CocoaPods
        run: pod install

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace TherianDiary.xcworkspace \
            -scheme TherianDiary \
            -archivePath $RUNNER_TEMP/TherianDiary.xcarchive \
            -configuration Release

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/TherianDiary.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TherianDiary-IPA
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 7
